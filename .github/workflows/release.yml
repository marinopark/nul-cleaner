name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build nulCleaner.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      - name: Regenerate icon from SVG (optional)
        run: |
          go run ./tools/svg2pngmain.go nulcleaner.svg build/appicon.png 1024
          go run ./tools/geniconmain.go build/appicon.png build/windows/icon.ico
        shell: pwsh

      - name: Build
        run: wails build -platform windows/amd64
        shell: pwsh

      # When SignPath Foundation onboarding completes, drop the signing step
      # in here. Until then the artefact is uploaded unsigned.
      # - name: Sign with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: nul-cleaner
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: nul-cleaner-exe
      #     github-artifact-id: ${{ steps.upload.outputs.artifact-id }}

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: nulCleaner-windows-amd64
          path: build/bin/nulCleaner.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/nulCleaner.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
